<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="./script.js" defer></script>
    <title>W Rank Checklist</title>
</head>



<body>

<div class="checklist-container">

    <h2>W Rank Checklist</h2>

    <h3>Rank: <span id="echoRank">E</span></h3>

    <h3 class="echo-total">Total Echoes: <span id="echoTotal">0</span> / <span class="echo-max">140</span></h3>

    <div class="progress-bar"><div id="progressFill"></div></div>

    <button id="clearBtn">Clear All</button>



    <ul id="echoChecklist">
        <li><label><input type="checkbox" data-echo="1"><span>[1 Echo] Craft a Food item</span></label></li>
        <li><label><input type="checkbox" data-echo="1"><span>[1 Echo] Catch a Fish</span></label></li>
        <li><label><input type="checkbox" data-echo="1"><span>[1 Echo] Modify a Mantra</span></label></li>
        <li><label><input type="checkbox" data-echo="1"><span>[1 Echo] Turn in a Pure Ore to a Blacksmith</span></label></li>

        <li><label><input type="checkbox" data-echo="2"><span>[2 Echos] Drink an Attribute Flask</span></label></li>
        <li><label><input type="checkbox" data-echo="2"><span>[2 Echos] Craft a Master Armor</span></label></li>
        <li><label><input type="checkbox" data-echo="2"><span>[2 Echos] Use a Deep Shrine</span></label></li>
        <li><label><input type="checkbox" data-echo="2"><span>[2 Echos] Make a deal with Misérables</span></label></li>
        <li><label><input type="checkbox" data-echo="2"><span>[2 Echos] Bargain with Yun'Shul</span></label></li>

        <li><label><input type="checkbox" data-echo="5"><span>[5 Echos] Unbound an Attribute</span></label></li>
        <li><label><input type="checkbox" data-echo="5"><span>[5 Echos] Obtain an Oath</span></label></li>
        <li><label><input type="checkbox" data-echo="5"><span>[5 Echos] Soul-bind an enchanted or legendary item</span></label></li>
        <li><label><input type="checkbox" data-echo="5"><span>[5 Echos] Enchant an item with an Enchant Stone or Enchant Grease</span></label></li>
        <li><label><input type="checkbox" data-echo="5"><span>[5 Echos] Obtain an enchant from Laplace</span></label></li>
        <li><label><input type="checkbox" data-echo="5"><span>[5 Echos] Clear a World Event</span></label></li>
        <li><label><input type="checkbox" data-echo="5"><span>[5 Echos] Use a Pluripotent Alloy to alloy a weapon</span></label></li>
        <li><label><input type="checkbox" data-echo="5"><span>[5 Echos] Obtain a Murmur</span></label></li>

        <li><label><input type="checkbox" data-echo="5"><span>[5 Echos] Defeat Duke Erisia</span></label></li>
        <li><label><input type="checkbox" data-echo="5"><span>[5 Echos] Defeat The Ferryman</span></label></li>
        <li><label><input type="checkbox" data-echo="5"><span>[5 Echos] Defeat Chaser, Scholar of the Crimson Contract</span></label></li>
        <li><label><input type="checkbox" data-echo="5"><span>[5 Echos] Defeat Primadon or Elder Primadon</span></label></li>

        <li><label><input type="checkbox" data-echo="10"><span>[10 Echos] Defeat the Scion of Ethiron</span></label></li>
        <li><label><input type="checkbox" data-echo="10"><span>[10 Echos] Complete Hell Mode</span></label></li>
        <li><label><input type="checkbox" data-echo="10"><span>[10 Echos] Complete Layer 2 Floor 1 without a Light Hook</span></label></li>
